<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyAccount Pro</title>

<style>
*{box-sizing:border-box;font-family:Arial}
body{
    margin:0;
    background:linear-gradient(180deg,#081420,#0f2f45);
    color:white;
}
.container{padding:20px;max-width:400px;margin:auto;}
.card{
    background:#112b3c;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:#0b1e2d;
    color:white;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    margin-top:5px;
}
.btn-topup{background:#00c853;}
.btn-withdraw{background:#ff5252;}
.logout{background:#888;margin-top:10px;}

.info{
    background:#0b1e2d;
    padding:15px;
    border-radius:15px;
    margin:10px 0;
}
.saldo{
    color:#00e676;
    font-size:20px;
    font-weight:bold;
}

#dashboard{display:none;}
#adminBox{
    display:none;
    background:#0b1e2d;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="id" placeholder="ID">
    <input type="password" id="pass" placeholder="Password">
    <button class="btn-topup" onclick="login()">Masuk</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard">
    <h2>Dashboard</h2>

    <div class="info">ID: <span id="showId"></span></div>
    <div class="info">Nama: <span id="showNama"></span></div>
    <div class="info saldo">Saldo: RM <span id="showSaldo"></span></div>

    <input type="number" id="jumlah" placeholder="Masukkan jumlah">

    <button class="btn-topup" onclick="showAdmin()">Isi Saldo</button>
    <button class="btn-withdraw" onclick="withdraw()">Withdraw</button>

    <!-- REKENING ADMIN -->
    <div id="adminBox">
        <p><b>Transfer ke Rekening Admin</b></p>
        <p>Bank: BRI</p>
        <p>No Rekening: <b>1234567890</b></p>
        <p>Atas Nama: <b>ADMIN STORE</b></p>
        <p>Nominal: RM <span id="nominal"></span></p>
        <p style="color:#00e676;">*Setelah transfer hubungi admin</p>
    </div>

    <button class="logout" onclick="logout()">Logout</button>
</div>

</div>

<script>

let currentUser = null;

// DATA USER
const users = [
    {id:"123", password:"123", nama:"Farid Fauzan", saldo:5000},
    {id:"456", password:"456", nama:"Budi", saldo:1500}
];

// AUTO LOGIN
window.onload = function(){
    let session = localStorage.getItem("loginUser");
    if(session){
        showDashboard(JSON.parse(session));
    }
};

// LOGIN
function login(){
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    let user = users.find(u => u.id === id && u.password === pass);

    if(user){
        currentUser = user;
        localStorage.setItem("loginUser", JSON.stringify(user));
        showDashboard(user);
    } else {
        alert("ID atau Password salah!");
    }
}

// DASHBOARD
function showDashboard(user){
    currentUser = user;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    document.getElementById("showId").innerText = user.id;
    document.getElementById("showNama").innerText = user.nama;
    updateSaldo();
}

// FORMAT RINGGIT
function formatRM(angka){
    return angka.toLocaleString("ms-MY");
}

// UPDATE SALDO
function updateSaldo(){
    document.getElementById("showSaldo").innerText = formatRM(currentUser.saldo);
}

// TAMPIL REKENING ADMIN
function showAdmin(){
    let jumlah = parseInt(document.getElementById("jumlah").value);

    if(!jumlah || jumlah <= 0){
        alert("Masukkan jumlah terlebih dahulu!");
        return;
    }

    document.getElementById("adminBox").style.display = "block";
    document.getElementById("nominal").innerText = formatRM(jumlah);
}

// WITHDRAW (DIBLOK + INFO)
function withdraw(){
    alert("Harap selesaikan administrasi sebesar 700 RM terlebih dahulu!");
}

// LOGOUT
function logout(){
    localStorage.removeItem("loginUser");
    location.reload();
}

</script>

</body>
</html>
