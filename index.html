<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wallet</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background:#0f172a;
    color:white;
}

/* LOGIN */
#login{padding:20px;}
.login-box{
    margin-top:120px;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
}
.login-box input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}
.login-box button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    font-weight:bold;
}

/* DASHBOARD */
#dashboard{display:none;}

.header{
    padding:20px;
    font-size:18px;
    font-weight:bold;
}

/* CARD SALDO */
.balance-card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
}
.balance{
    font-size:28px;
    margin-top:10px;
    font-weight:bold;
}
.user{
    font-size:13px;
    margin-top:5px;
    opacity:0.8;
}

/* MENU */
.menu{
    display:flex;
    gap:10px;
    padding:15px;
}
.menu button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    font-weight:bold;
    color:white;
}
.topup{background:#10b981;}
.withdraw{background:#ef4444;}

/* BOX */
.box{
    margin:15px;
    padding:15px;
    background:#1e293b;
    border-radius:15px;
    display:none;
}

/* INPUT */
.box input{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

/* BUTTON */
.wa button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#25D366;
    margin-top:10px;
    font-weight:bold;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>Log Masuk</h2>
        <input type="text" id="id" placeholder="ID">
        <input type="password" id="pass" placeholder="Kata Laluan">
        <button onclick="login()">Masuk</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">My Wallet</div>

<div class="balance-card">
    <div>Baki Akaun</div>
    <div class="balance">RM <span id="saldo">0</span></div>
    <div class="user" id="userInfo"></div>
</div>

<div class="menu">
    <button class="topup" onclick="showTopup()">Top Up</button>
    <button class="withdraw" onclick="showWithdraw()">Withdraw</button>
</div>

<!-- TOPUP -->
<div class="box" id="topupBox">
    <p><b>Pindahan ke Admin</b></p>
    <p>Bank: BRI</p>
    <p>No Akaun: 1234567890</p>
    <p>Nama: ADMIN STORE</p>
    <p>Jumlah: RM <span id="nominal"></span></p>

    <input type="number" id="jumlah" placeholder="Masukkan jumlah">

    <div class="wa">
        <a id="waTopup" target="_blank">
            <button>WhatsApp Admin</button>
        </a>
    </div>
</div>

<!-- WITHDRAW -->
<div class="box" id="withdrawBox">
    <input type="number" id="wdJumlah" placeholder="Jumlah">
    <input type="text" id="wdBank" placeholder="Nama Bank">
    <input type="text" id="wdRek" placeholder="Nombor Akaun">
    <input type="text" id="wdNama" placeholder="Nama Akaun">

    <div class="wa">
        <button onclick="submitWithdraw()">Hantar Permintaan</button>
    </div>
</div>

</div>

<script>

let currentUser=null;
const noAdmin="6285183034790";

const users=[
    {id:"123",password:"123",nama:"Farid Fauzan",saldo:5000}
];

/* LOGIN */
function login(){
    let id=idInput.value;
    let pass=passInput.value;

    let user=users.find(u=>u.id===id && u.password===pass);

    if(user){
        currentUser=user;
        login.style.display="none";
        dashboard.style.display="block";

        userInfo.innerText=user.nama+" ("+user.id+")";
        updateSaldo();
    }else{
        alert("Login gagal");
    }
}

/* FORMAT */
function formatRM(x){
    return Number(x).toLocaleString("ms-MY");
}

/* UPDATE */
function updateSaldo(){
    saldo.innerText=formatRM(currentUser.saldo);
}

/* TOPUP */
function showTopup(){
    topupBox.style.display="block";
    withdrawBox.style.display="none";
}

jumlah.oninput=function(){
    nominal.innerText=formatRM(jumlah.value||0);

    let msg=`Halo admin,
Saya ingin top up RM ${formatRM(jumlah.value||0)}

ID: ${currentUser.id}
Nama: ${currentUser.nama}`;

    waTopup.href=`https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

/* WITHDRAW */
function showWithdraw(){
    withdrawBox.style.display="block";
    topupBox.style.display="none";
}

function submitWithdraw(){
    let j=wdJumlah.value;
    let b=wdBank.value;
    let r=wdRek.value;
    let n=wdNama.value;

    if(!j||!b||!r||!n){
        alert("Lengkapkan semua maklumat!");
        return;
    }

    let msg=`Halo admin,
Pengeluaran diminta

ID: ${currentUser.id}
Nama: ${currentUser.nama}

Jumlah: RM ${formatRM(j)}
Bank: ${b}
No Akaun: ${r}
Nama Akaun: ${n}`;

    window.open(`https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
