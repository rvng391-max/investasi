<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Wallet</title>

<style>
*{
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    margin:0;
    background:linear-gradient(180deg,#050d1a,#0f2f45);
    color:white;
}

/* CONTAINER */
.container{
    max-width:420px;
    margin:auto;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* LOGIN */
#dashboard{display:none;}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:#0b1e2d;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    margin-top:10px;
}

/* BUTTON STYLE */
.btn-primary{
    background:linear-gradient(90deg,#00c853,#00e676);
    color:white;
}

.btn-danger{
    background:#ff5252;
}

.btn-wa{
    background:#25D366;
}

.logout{
    background:#555;
}

/* SALDO CARD */
.balance-card{
    background:linear-gradient(135deg,#00c853,#009688);
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
}

.balance-title{
    font-size:14px;
    opacity:0.8;
}

.balance-value{
    font-size:28px;
    font-weight:bold;
    margin-top:5px;
}

/* INFO */
.info{
    margin:8px 0;
    font-size:14px;
    opacity:0.9;
}

/* ADMIN BOX */
#adminBox{
    display:none;
    margin-top:15px;
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h2>Log Masuk</h2>
    <input type="text" id="id" placeholder="Masukkan ID">
    <input type="password" id="pass" placeholder="Kata Laluan">
    <button class="btn-primary" onclick="login()">Masuk</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <!-- SALDO -->
    <div class="balance-card">
        <div class="balance-title">Baki Semasa</div>
        <div class="balance-value">RM <span id="showSaldo"></span></div>
    </div>

    <div class="card">
        <div class="info">ID: <span id="showId"></span></div>
        <div class="info">Nama: <span id="showNama"></span></div>

        <input type="number" id="jumlah" placeholder="Masukkan jumlah">

        <button class="btn-primary" onclick="showAdmin()">Tambah Baki</button>
        <button class="btn-danger" onclick="withdraw()">Pengeluaran</button>

        <!-- ADMIN -->
        <div id="adminBox">
            <p><b>Pindahan ke Akaun Admin</b></p>
            <p>Bank: BRI</p>
            <p>No Akaun: <b>1234567890</b></p>
            <p>Nama: <b>ADMIN STORE</b></p>
            <p>Jumlah: RM <span id="nominal"></span></p>

            <a id="waLink" target="_blank">
                <button class="btn-wa">WhatsApp Admin</button>
            </a>
        </div>

        <button class="logout" onclick="logout()">Log Keluar</button>
    </div>

</div>

</div>

<script>

let currentUser = null;
const noAdmin = "6285183034790";

const users = [
    {id:"123", password:"123", nama:"Farid Fauzan", saldo:5000},
    {id:"456", password:"456", nama:"Budi", saldo:1500}
];

// AUTO LOGIN
window.onload = function(){
    let session = localStorage.getItem("loginUser");
    if(session){
        showDashboard(JSON.parse(session));
    }
};

// LOGIN
function login(){
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    let user = users.find(u => u.id === id && u.password === pass);

    if(user){
        currentUser = user;
        localStorage.setItem("loginUser", JSON.stringify(user));
        showDashboard(user);
    } else {
        alert("ID atau kata laluan salah!");
    }
}

// DASHBOARD
function showDashboard(user){
    currentUser = user;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    document.getElementById("showId").innerText = user.id;
    document.getElementById("showNama").innerText = user.nama;
    updateSaldo();
}

// FORMAT
function formatRM(angka){
    return angka.toLocaleString("ms-MY");
}

// UPDATE SALDO
function updateSaldo(){
    document.getElementById("showSaldo").innerText = formatRM(currentUser.saldo);
}

// SHOW ADMIN
function showAdmin(){
    let jumlah = parseInt(document.getElementById("jumlah").value);

    if(!jumlah || jumlah <= 0){
        alert("Masukkan jumlah dahulu!");
        return;
    }

    document.getElementById("adminBox").style.display = "block";
    document.getElementById("nominal").innerText = formatRM(jumlah);

    let pesan = `Halo admin,
Saya ingin top up RM ${formatRM(jumlah)}.
ID: ${currentUser.id}
Nama: ${currentUser.nama}`;

    let link = `https://wa.me/${noAdmin}?text=${encodeURIComponent(pesan)}`;
    document.getElementById("waLink").href = link;
}

// WITHDRAW
function withdraw(){
    alert("Sila selesaikan caj pentadbiran 700 RM terlebih dahulu!");
}

// LOGOUT
function logout(){
    localStorage.removeItem("loginUser");
    location.reload();
}

</script>

</body>
</html>
