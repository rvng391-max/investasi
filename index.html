<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MyAccount Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1e2d;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:320px;
}

/* CARD */
.card{
    background:#112b3c;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    background:#00c853;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.logout{
    background:red;
    margin-top:15px;
}

/* DASHBOARD */
#dashboard{
    display:none;
}
</style>

</head>
<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="id" placeholder="Masukkan ID">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Masuk</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard">
    <h2>Dashboard</h2>
    <p><b>ID:</b> <span id="showId"></span></p>
    <p><b>Nama:</b> <span id="showNama"></span></p>
    <p><b>Saldo:</b> Rp <span id="showSaldo"></span></p>

    <button class="logout" onclick="logout()">Logout</button>
</div>

</div>

<script>

// DATABASE USER (bisa tambah sendiri)
const users = [
    {id:"123", password:"123", nama:"Farid", saldo:"10.000.000"},
    {id:"456", password:"456", nama:"Budi", saldo:"5.000.000"}
];

// AUTO LOGIN (session)
window.onload = function(){
    let session = localStorage.getItem("loginUser");
    if(session){
        showDashboard(JSON.parse(session));
    }
};

// LOGIN FUNCTION
function login(){
    let inputId = document.getElementById("id").value;
    let inputPass = document.getElementById("pass").value;

    let found = users.find(u => u.id === inputId && u.password === inputPass);

    if(found){
        localStorage.setItem("loginUser", JSON.stringify(found));
        showDashboard(found);
    } else {
        alert("ID atau Password salah!");
    }
}

// TAMPIL DASHBOARD
function showDashboard(user){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("showId").innerText = user.id;
    document.getElementById("showNama").innerText = user.nama;
    document.getElementById("showSaldo").innerText = user.saldo;
}

// LOGOUT
function logout(){
    localStorage.removeItem("loginUser");
    location.reload();
}

</script>

</body>
</html>
