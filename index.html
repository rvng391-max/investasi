<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Wallet</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background:#000;
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    font-weight:bold;
    font-size:18px;
    color:#22c55e;
}

/* CARD */
.card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:#111;
}

/* SALDO */
.balance{
    font-size:30px;
    margin-top:10px;
    font-weight:bold;
}

/* INPUT */
.input{
    padding:15px;
}
.input input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#222;
    color:white;
    margin-bottom:10px;
}

/* BUTTON */
.btn{
    margin:10px 15px;
    padding:15px;
    width:calc(100% - 30px);
    border:none;
    border-radius:12px;
    font-weight:bold;
}
.green{background:#22c55e;}
.red{background:#ef4444;}
.wa{background:#25D366;}

/* BOX */
.box{
    margin:15px;
    padding:15px;
    background:#111;
    border-radius:15px;
    display:none;
}
</style>

</head>
<body>

<div class="header">PREMIUM WALLET</div>

<!-- SALDO -->
<div class="card">
    <div>Baki Akaun</div>
    <div class="balance">RM <span id="saldo">5000</span></div>
</div>

<!-- INPUT -->
<div class="input">
    <input type="number" id="jumlah" placeholder="Masukkan jumlah">
</div>

<!-- BUTTON -->
<button class="btn green" onclick="topup()">Tambah Baki</button>
<button class="btn red" onclick="showWithdraw()">Pengeluaran</button>

<!-- TOPUP -->
<div class="box" id="topupBox">
    <p><b>Pindahan ke Admin</b></p>
    <p>Bank: BRI</p>
    <p>No Akaun: 1234567890</p>
    <p>Nama: ADMIN STORE</p>
    <p>Jumlah: RM <span id="nominal"></span></p>

    <a id="waTopup" target="_blank">
        <button class="btn wa">Chat WhatsApp Admin</button>
    </a>
</div>

<!-- WITHDRAW -->
<div class="box" id="withdrawBox">
    <input type="number" id="wdJumlah" placeholder="Jumlah">
    <input type="text" id="wdBank" placeholder="Nama Bank">
    <input type="text" id="wdRek" placeholder="Nombor Akaun">
    <input type="text" id="wdNama" placeholder="Nama Pemilik Akaun">

    <button class="btn wa" onclick="submitWithdraw()">Hantar Permintaan</button>
</div>

<script>

let saldo = 5000;
const noAdmin = "6285183034790";

/* FORMAT */
function formatRM(x){
    return Number(x).toLocaleString("ms-MY");
}

/* UPDATE */
function update(){
    document.getElementById("saldo").innerText = formatRM(saldo);
}

/* TOPUP */
function topup(){
    let j = parseInt(document.getElementById("jumlah").value);

    if(!j){
        alert("Masukkan jumlah!");
        return;
    }

    document.getElementById("topupBox").style.display="block";
    document.getElementById("withdrawBox").style.display="none";

    document.getElementById("nominal").innerText = formatRM(j);

    let msg = `Halo admin,
Saya ingin tambah baki RM ${formatRM(j)}.

Sila sahkan pembayaran saya.`;

    document.getElementById("waTopup").href =
    `https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

/* SHOW WITHDRAW */
function showWithdraw(){
    document.getElementById("withdrawBox").style.display="block";
    document.getElementById("topupBox").style.display="none";
}

/* SUBMIT WITHDRAW */
function submitWithdraw(){
    let j = document.getElementById("wdJumlah").value;
    let b = document.getElementById("wdBank").value;
    let r = document.getElementById("wdRek").value;
    let n = document.getElementById("wdNama").value;

    if(!j || !b || !r || !n){
        alert("Sila lengkapkan semua maklumat!");
        return;
    }

    let msg = `Halo admin,
Saya ingin pengeluaran.

Jumlah: RM ${formatRM(j)}
Bank: ${b}
No Akaun: ${r}
Nama: ${n}

Mohon diproses.`;

    window.open(`https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`);
}

update();

</script>

</body>
</html>
