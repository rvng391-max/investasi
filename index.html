<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaun Saya</title>

<style>
*{box-sizing:border-box;font-family:Arial}
body{
    margin:0;
    background:linear-gradient(180deg,#081420,#0f2f45);
    color:white;
}
.container{padding:20px;max-width:400px;margin:auto;}
.card{
    background:#112b3c;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:#0b1e2d;
    color:white;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    margin-top:5px;
}
.btn-topup{background:#00c853;}
.btn-withdraw{background:#ff5252;}
.logout{background:#888;margin-top:10px;}

.info{
    background:#0b1e2d;
    padding:15px;
    border-radius:15px;
    margin:10px 0;
}
.saldo{
    color:#00e676;
    font-size:20px;
    font-weight:bold;
}

#dashboard{display:none;}
#adminBox{
    display:none;
    background:#0b1e2d;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h2>Log Masuk</h2>
    <input type="text" id="id" placeholder="Masukkan ID">
    <input type="password" id="pass" placeholder="Kata Laluan">
    <button class="btn-topup" onclick="login()">Masuk</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard">
    <h2>Papan Pemuka</h2>

    <div class="info">ID: <span id="showId"></span></div>
    <div class="info">Nama: <span id="showNama"></span></div>
    <div class="info saldo">Baki: RM <span id="showSaldo"></span></div>

    <input type="number" id="jumlah" placeholder="Masukkan jumlah">

    <button class="btn-topup" onclick="showAdmin()">Tambah Baki</button>
    <button class="btn-withdraw" onclick="withdraw()">Pengeluaran</button>

    <!-- AKAUN ADMIN -->
    <div id="adminBox">
        <p><b>Pindahan ke Akaun Admin</b></p>
        <p>Bank: BRI</p>
        <p>No Akaun: <b>1234567890</b></p>
        <p>Nama: <b>ADMIN STORE</b></p>
        <p>Jumlah: RM <span id="nominal"></span></p>

        <!-- UPLOAD BUKTI -->
        <div style="margin-top:10px;">
            <p><b>Muat Naik Bukti Transfer</b></p>
            <input type="file" id="bukti" accept="image/*">
            <p id="namaFile" style="font-size:12px;color:#aaa;"></p>
        </div>

        <!-- WHATSAPP -->
        <a id="waLink" target="_blank">
            <button style="background:#25D366;margin-top:10px;">
                Hantar ke WhatsApp Admin
            </button>
        </a>

        <p style="color:#00e676;">*Selepas pindahan, sila hantar bukti ke admin</p>
    </div>

    <button class="logout" onclick="logout()">Log Keluar</button>
</div>

</div>

<script>

let currentUser = null;
let fileName = "";

// NOMOR ADMIN
const noAdmin = "6285183034790";

// DATA USER
const users = [
    {id:"123", password:"123", nama:"Farid Fauzan", saldo:5000},
    {id:"456", password:"456", nama:"Budi", saldo:1500}
];

// AUTO LOGIN
window.onload = function(){
    let session = localStorage.getItem("loginUser");
    if(session){
        showDashboard(JSON.parse(session));
    }
};

// LOGIN
function login(){
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    let user = users.find(u => u.id === id && u.password === pass);

    if(user){
        currentUser = user;
        localStorage.setItem("loginUser", JSON.stringify(user));
        showDashboard(user);
    } else {
        alert("ID atau kata laluan salah!");
    }
}

// DASHBOARD
function showDashboard(user){
    currentUser = user;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    document.getElementById("showId").innerText = user.id;
    document.getElementById("showNama").innerText = user.nama;
    updateSaldo();
}

// FORMAT RM
function formatRM(angka){
    return angka.toLocaleString("ms-MY");
}

// UPDATE SALDO
function updateSaldo(){
    document.getElementById("showSaldo").innerText = formatRM(currentUser.saldo);
}

// TAMPIL ADMIN
function showAdmin(){
    let jumlah = parseInt(document.getElementById("jumlah").value);

    if(!jumlah || jumlah <= 0){
        alert("Sila masukkan jumlah terlebih dahulu!");
        return;
    }

    document.getElementById("adminBox").style.display = "block";
    document.getElementById("nominal").innerText = formatRM(jumlah);

    updateWhatsAppLink(jumlah);
}

// UPLOAD FILE
document.addEventListener("change", function(e){
    if(e.target && e.target.id === "bukti"){
        let file = e.target.files[0];
        if(file){
            fileName = file.name;
            document.getElementById("namaFile").innerText = "Fail: " + fileName;
        }
    }
});

// LINK WHATSAPP
function updateWhatsAppLink(jumlah){
    let pesan = `Halo admin,
Saya ingin top up RM ${formatRM(jumlah)}.
ID: ${currentUser.id}
Nama: ${currentUser.nama}
Bukti: ${fileName || "akan dihantar di chat"}`;

    let link = `https://wa.me/${noAdmin}?text=${encodeURIComponent(pesan)}`;
    document.getElementById("waLink").href = link;
}

// WITHDRAW
function withdraw(){
    alert("Sila selesaikan caj pentadbiran sebanyak 700 RM terlebih dahulu!");
}

// LOGOUT
function logout(){
    localStorage.removeItem("loginUser");
    location.reload();
}

</script>

</body>
</html>
