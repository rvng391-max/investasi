<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Wallet Trading</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#020617;color:white;}

/* NAV */
.nav{
    display:flex;
    background:#0f172a;
}
.nav button{
    flex:1;
    padding:15px;
    border:none;
    background:none;
    color:white;
    font-weight:bold;
}
.active{background:#1e293b;}

/* HEADER */
.header{padding:20px;font-size:18px;font-weight:bold;color:#facc15;}

/* CARD */
.card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#1e3a8a,#9333ea);
}

.balance{font-size:28px;margin-top:10px;font-weight:bold;}

/* INPUT */
.input{padding:15px;}
.input input{
    width:100%;padding:15px;border:none;border-radius:15px;background:#1e293b;color:white;
}

/* BUTTON */
.btn{
    margin:10px 15px;
    padding:15px;
    border:none;
    border-radius:15px;
    font-weight:bold;
    width:calc(100% - 30px);
}
.green{background:#22c55e;}
.red{background:#ef4444;}
.wa{background:#25D366;}

/* SECTION */
.section{display:none;}
.show{display:block;}

/* TRADING */
.price{font-size:30px;text-align:center;margin-top:20px;}
.chart{
    height:100px;
    margin:15px;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    border-radius:10px;
}
</style>
</head>
<body>

<div class="header">SUPER APP</div>

<div class="nav">
    <button class="active" onclick="showTab('wallet')">Wallet</button>
    <button onclick="showTab('trading')">Trading</button>
</div>

<!-- WALLET -->
<div id="wallet" class="section show">

<div class="card">
    <div>Baki</div>
    <div class="balance">RM <span id="saldo">5000</span></div>
</div>

<div class="input">
    <input type="number" id="jumlah" placeholder="Masukkan jumlah">
</div>

<button class="btn green" onclick="topup()">Tambah Baki</button>
<button class="btn red" onclick="showWithdraw()">Pengeluaran</button>

<div id="adminBox" style="display:none;padding:15px;">
    <p>Bank: BRI</p>
    <p>No Akaun: 1234567890</p>
    <p>Nama: ADMIN</p>
    <p>Jumlah: RM <span id="nominal"></span></p>

    <a id="waTopup" target="_blank">
        <button class="btn wa">Chat Admin</button>
    </a>
</div>

<div id="withdrawBox" style="display:none;padding:15px;">
    <input type="number" id="wdJumlah" placeholder="Jumlah">
    <input type="text" id="wdBank" placeholder="Bank">
    <input type="text" id="wdRek" placeholder="No Akaun">
    <input type="text" id="wdNama" placeholder="Nama">

    <button class="btn wa" onclick="submitWithdraw()">Ajukan</button>
</div>

</div>

<!-- TRADING -->
<div id="trading" class="section">

<div class="price">RM <span id="price">100</span></div>

<div class="chart"></div>

<button class="btn green" onclick="buy()">BUY</button>
<button class="btn red" onclick="sell()">SELL</button>

</div>

<script>

let saldo=5000;
let price=100;
const noAdmin="6285183034790";

/* TAB */
function showTab(tab){
    document.getElementById("wallet").classList.remove("show");
    document.getElementById("trading").classList.remove("show");

    document.getElementById(tab).classList.add("show");
}

/* FORMAT */
function formatRM(x){
    return Number(x).toLocaleString("ms-MY");
}

/* UPDATE */
function update(){
    document.getElementById("saldo").innerText=formatRM(saldo);
    document.getElementById("price").innerText=formatRM(price);
}

/* TOPUP */
function topup(){
    let j=parseInt(document.getElementById("jumlah").value);
    if(!j){alert("Masukkan jumlah");return;}

    document.getElementById("adminBox").style.display="block";
    document.getElementById("withdrawBox").style.display="none";
    document.getElementById("nominal").innerText=formatRM(j);

    let msg=`Halo admin, top up RM ${formatRM(j)}`;
    document.getElementById("waTopup").href=
    `https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

/* WITHDRAW */
function showWithdraw(){
    document.getElementById("withdrawBox").style.display="block";
    document.getElementById("adminBox").style.display="none";
}

function submitWithdraw(){
    let j=wdJumlah.value;
    let b=wdBank.value;
    let r=wdRek.value;
    let n=wdNama.value;

    let msg=`Withdraw RM ${j} Bank ${b} Rek ${r} Nama ${n}`;
    window.open(`https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`);
}

/* TRADING SIMULASI */
setInterval(()=>{
    let change=(Math.random()*4-2);
    price+=change;
    if(price<1)price=1;
    update();
},2000);

function buy(){
    if(saldo>=price){
        saldo-=price;
        alert("BUY berjaya");
        update();
    }else{
        alert("Saldo tidak cukup");
    }
}

function sell(){
    saldo+=price;
    alert("SELL berjaya");
    update();
}

update();

</script>

</body>
</html>
