<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
    background:#000;
    color:white;
}

/* NAV */
.nav{
    display:flex;
    background:#111;
}
.nav button{
    flex:1;
    padding:15px;
    border:none;
    background:none;
    color:#aaa;
    font-weight:bold;
}
.nav button.active{
    color:#fff;
    border-bottom:2px solid #22c55e;
}

/* HEADER */
.header{
    padding:20px;
    font-weight:bold;
    color:#22c55e;
}

/* CARD */
.card{
    margin:15px;
    padding:20px;
    border-radius:15px;
    background:#111;
}

/* SALDO */
.balance{
    font-size:30px;
    margin-top:10px;
}

/* INPUT */
.input{
    padding:15px;
}
.input input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}

/* BUTTON */
.btn{
    margin:10px 15px;
    padding:15px;
    width:calc(100% - 30px);
    border:none;
    border-radius:10px;
    font-weight:bold;
}
.green{background:#22c55e;}
.red{background:#ef4444;}

/* SECTION */
.section{display:none;}
.show{display:block;}
</style>
</head>
<body>

<div class="header">SIMULASI WALLET</div>

<div class="nav">
    <button class="active" onclick="showTab('wallet')">Wallet</button>
    <button onclick="showTab('trading')">Trading</button>
</div>

<!-- WALLET -->
<div id="wallet" class="section show">

<div class="card">
    <div>Baki (Simulasi)</div>
    <div class="balance">RM <span id="saldo">0</span></div>
</div>

<div class="input">
    <input type="number" id="jumlah" placeholder="Masukkan deposit">
</div>

<button class="btn green" onclick="deposit()">Deposit</button>

</div>

<!-- TRADING -->
<div id="trading" class="section">
<div class="card">
    <div>Harga (Simulasi)</div>
    <div class="balance">RM <span id="price">100</span></div>
</div>
</div>

<script>

let saldo = 0;
let price = 100;
let growthInterval = null;

/* TAB */
function showTab(tab){
    document.getElementById("wallet").classList.remove("show");
    document.getElementById("trading").classList.remove("show");

    document.getElementById(tab).classList.add("show");

    let buttons = document.querySelectorAll(".nav button");
    buttons.forEach(b=>b.classList.remove("active"));

    if(tab==="wallet") buttons[0].classList.add("active");
    else buttons[1].classList.add("active");
}

/* FORMAT */
function formatRM(x){
    return Number(x).toLocaleString("ms-MY");
}

/* UPDATE */
function update(){
    document.getElementById("saldo").innerText = formatRM(saldo);
    document.getElementById("price").innerText = formatRM(price);
}

/* DEPOSIT */
function deposit(){
    let j = parseInt(document.getElementById("jumlah").value);

    if(!j){
        alert("Masukkan jumlah");
        return;
    }

    saldo += j;
    update();

    startGrowth();

    alert("Deposit berjaya (SIMULASI)");
}

/* AUTO GROWTH */
function startGrowth(){
    if(growthInterval) return;

    growthInterval = setInterval(()=>{
        let naik = Math.floor(Math.random()*5)+1;
        saldo += naik;
        update();
    },3000);
}

/* HARGA NAIK TURUN */
setInterval(()=>{
    let change = Math.random()*4 - 2;
    price += change;
    if(price < 1) price = 1;
    update();
},2000);

update();

</script>

</body>
</html>
